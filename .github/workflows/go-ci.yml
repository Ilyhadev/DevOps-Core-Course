name: CI — Go app (test, lint, build & publish)

on:
  push:
    branches: [ main, master, lab03 ]
    paths:
      - 'labs_solution/lab1/app_go/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: [ main, master, lab03 ]
    paths:
      - 'labs_solution/lab1/app_go/**'
      - '.github/workflows/go-ci.yml'

permissions:
  contents: read

jobs:
  test-lint:
    name: Test & Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          working-directory: labs_solution/lab1/app_go
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: |
          cd labs_solution/lab1/app_go
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

  docker-build-push:
    name: Build & Push Docker (Go)
    runs-on: ubuntu-latest
    needs: test-lint
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Generate version (CalVer)
        id: version
        run: |
          VERSION=$(date +"%Y.%m.%d")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and push Go image
        uses: docker/build-push-action@v4
        with:
          context: labs_solution/lab1/app_go
          file: labs_solution/lab1/app_go/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/devops-info-go:${{ env.VERSION }}
            ${{ env.DOCKERHUB_USERNAME }}/devops-info-go:latest
