apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-info-python.fullname" . }}
  labels:
    {{- include "devops-info-python.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.deployment.revisionHistoryLimit }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.deployment.strategy.maxSurge }}
      maxUnavailable: {{ .Values.deployment.strategy.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "devops-info-python.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-info-python.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
      {{- if .Values.vault.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-config: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "`}}{{ .Values.vault.secretPath }}{{`" -}}
          export VAULT_USERNAME="{{ .Data.data.username }}"
          export VAULT_PASSWORD="{{ .Data.data.password }}"
          export VAULT_DB_URL="{{ .Data.data.db_url }}"
          export VAULT_API_KEY="{{ .Data.data.api_key }}"
          {{- end }}`}}
      {{- end }}
    spec:
      containers:
        - name: {{ include "devops-info-python.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- if .Values.secrets.enabled }}
            # Secrets as environment variables
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-python.fullname" . }}-app-credentials
                  key: username
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-python.fullname" . }}-app-credentials
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-python.fullname" . }}-app-credentials
                  key: database-url
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-python.fullname" . }}-app-credentials
                  key: api-key
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
