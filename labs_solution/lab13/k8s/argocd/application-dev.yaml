apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ilyhadev/DevOps-Core-Course.git
    targetRevision: lab13
    path: labs_solution/lab13/k8s/devops-info-python
    helm:
      parameters:
        - name: service.nodePort
          value: "30082"
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
