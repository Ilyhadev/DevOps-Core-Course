apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-info-python.fullname" . }}-config
  labels:
    {{- include "devops-info-python.labels" . | nindent 4 }}
data:
  config.json: |
{{ .Files.Get "files/config.json" | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-info-python.fullname" . }}-env
  labels:
    {{- include "devops-info-python.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.environment | quote }}
  LOG_LEVEL: {{ .Values.logLevel | quote }}
  DATA_DIR: "/data"
