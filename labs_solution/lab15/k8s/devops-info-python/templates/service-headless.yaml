apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info-python.fullname" . }}-headless
  labels:
    {{- include "devops-info-python.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "devops-info-python.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
