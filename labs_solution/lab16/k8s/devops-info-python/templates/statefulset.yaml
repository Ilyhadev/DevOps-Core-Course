apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devops-info-python.fullname" . }}
  labels:
    {{- include "devops-info-python.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  serviceName: {{ include "devops-info-python.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy }}
  updateStrategy:
    type: {{ .Values.statefulset.updateStrategy.type }}
    {{- if and (eq .Values.statefulset.updateStrategy.type "RollingUpdate") (hasKey .Values.statefulset.updateStrategy "rollingUpdate") }}
    rollingUpdate:
      partition: {{ .Values.statefulset.updateStrategy.rollingUpdate.partition }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "devops-info-python.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-info-python.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
      {{- if .Values.vault.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-config: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "`}}{{ .Values.vault.secretPath }}{{`" -}}
          export VAULT_USERNAME="{{ .Data.data.username }}"
          export VAULT_PASSWORD="{{ .Data.data.password }}"
          export VAULT_DB_URL="{{ .Data.data.db_url }}"
          export VAULT_API_KEY="{{ .Data.data.api_key }}"
          {{- end }}`}}
      {{- end }}
    spec:
      {{- if .Values.initContainers.enabled }}
      initContainers:
        - name: wait-for-service
          image: {{ .Values.initContainers.waitForService.image }}
          command:
            - sh
            - -c
            - >-
              until nslookup {{ .Values.initContainers.waitForService.host }};
              do echo waiting for dependency;
              sleep 2;
              done
        - name: init-download
          image: {{ .Values.initContainers.download.image }}
          command:
            - sh
            - -c
            - wget -O /work-dir/index.html {{ .Values.initContainers.download.url }}
          volumeMounts:
            - name: init-workdir
              mountPath: /work-dir
      {{- end }}
      containers:
        - name: {{ include "devops-info-python.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- if .Values.secrets.enabled }}
            - name: APP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-python.fullname" . }}-app-credentials
                  key: username
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-python.fullname" . }}-app-credentials
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-python.fullname" . }}-app-credentials
                  key: database-url
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-info-python.fullname" . }}-app-credentials
                  key: api-key
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "devops-info-python.fullname" . }}-env
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: data
              mountPath: /data
            {{- if .Values.initContainers.enabled }}
            - name: init-workdir
              mountPath: /init-data
            {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "devops-info-python.fullname" . }}-config
        {{- if .Values.initContainers.enabled }}
        - name: init-workdir
          emptyDir: {}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "devops-info-python.labels" . | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
