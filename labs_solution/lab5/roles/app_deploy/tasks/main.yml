---
- name: Log in to Docker Hub
  docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
    state: present
  no_log: true
  when: dockerhub_password is defined and dockerhub_password | length > 0
  ignore_errors: true

- name: Pull Docker image
  docker_image:
    name: "{{ docker_image }}:{{ docker_image_tag }}"
    source: pull
  register: image_pull_result

- name: Stop existing container
  docker_container:
    name: "{{ app_container_name }}"
    state: stopped
  ignore_errors: true

- name: Remove old container
  docker_container:
    name: "{{ app_container_name }}"
    state: absent
  ignore_errors: true

- name: Run application container
  docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ app_port }}:8080"
    env: "{{ app_environment | default({}) }}"

- name: Wait for application port to be available
  wait_for:
    port: "{{ app_port }}"
    delay: 5
    timeout: 30

- name: Verify application health endpoint
  uri:
    url: "http://localhost:{{ app_port }}/health"
    method: GET
    status_code: 200
  register: health_check
  retries: 3
  delay: 2
  until: health_check.status == 200

- name: Display health check result
  debug:
    msg: "Application is healthy: {{ health_check.json }}"

