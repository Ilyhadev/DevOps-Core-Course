---
# Task 1: Refactor with Blocks & Tags
# This role installs common system packages and configures users
# Uses blocks for logical grouping and tags for selective execution

- name: Update apt cache with error handling
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

  rescue:
    - name: Handle apt cache update failure with fix-missing
      apt:
        update_cache: yes
        update_cache_retries: 5
        update_cache_retry_max_delay: 10
      args:
        update_cache_retry_max_delay: 10

  always:
    - name: Log cache update completion
      debug:
        msg: "APT cache update completed"

  become: true
  tags:
    - packages
    - common

- name: Install common packages
  block:
    - name: Install system packages
      apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Handle package installation failure
      debug:
        msg: "Package installation encountered an issue"

  always:
    - name: Log package installation completion
      copy:
        content: "Common packages installed at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/common_packages_installed.log
      become: true

  become: true
  tags:
    - packages
    - common

- name: Configure system users
  block:
    - name: Create application user
      user:
        name: "{{ app_user | default('appuser') }}"
        shell: /bin/bash
        home: "/home/{{ app_user | default('appuser') }}"
        create_home: yes
        state: present

    - name: Add user to sudoers if needed
      lineinfile:
        path: /etc/sudoers
        line: "{{ app_user | default('appuser') }} ALL=(ALL) NOPASSWD: ALL"
        validate: 'visudo -cf %s'
      when: app_user_sudoer | default(false)

  rescue:
    - name: Handle user creation failure
      debug:
        msg: "User creation encountered an issue"

  always:
    - name: Log user configuration completion
      copy:
        content: "User configuration completed at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/users_configured.log
      become: true

  become: true
  tags:
    - users
    - common
