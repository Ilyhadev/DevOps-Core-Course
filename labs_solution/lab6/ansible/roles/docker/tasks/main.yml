---
# Task 1: Docker Installation Role with Blocks & Tags
# This role installs Docker and related tools with error handling
# Uses blocks for logical grouping and tags for selective execution

- name: Install Docker prerequisites with error handling
  become: true
  tags:
    - packages
    - docker
    - docker_install
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-docker
          - python3-pip
        state: present

  rescue:
    - name: Handle dependency installation failure
      ansible.builtin.apt:
        update_cache: true
        update_cache_retries: 3

  always:
    - name: Log dependency installation
      ansible.builtin.debug:
        msg: "Docker dependency installation completed"

- name: Add Docker repository with error handling
  become: true
  tags:
    - docker
    - docker_install
  block:
    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
        keyring: /usr/share/keyrings/docker-archive-keyring.gpg
      retries: 3
      delay: 10

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

  rescue:
    - name: Wait and retry on GPG key failure
      ansible.builtin.pause:
        seconds: 10

    - name: Retry Docker GPG key addition
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
        keyring: /usr/share/keyrings/docker-archive-keyring.gpg
      retries: 2
      delay: 5

  always:
    - name: Log repository configuration
      ansible.builtin.debug:
        msg: "Docker repository configuration completed"

- name: Install Docker packages
  become: true
  tags:
    - docker
    - docker_install
  block:
    - name: Update apt cache before Docker install
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 300

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

  rescue:
    - name: Handle Docker package installation failure
      ansible.builtin.debug:
        msg: "Docker package installation encountered an issue"

  always:
    - name: Log Docker installation completion
      ansible.builtin.copy:
        content: "Docker packages installed at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/docker_installed.log
        mode: '0644'

- name: Configure Docker service
  become: true
  tags:
    - docker
    - docker_config
  block:
    - name: Ensure Docker service is started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure Docker service is enabled
      ansible.builtin.service:
        name: docker
        enabled: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

  rescue:
    - name: Handle service configuration failure
      ansible.builtin.debug:
        msg: "Docker service configuration encountered an issue"

  always:
    - name: Log Docker configuration completion
      ansible.builtin.debug:
        msg: "Docker service configuration completed"

- name: Install docker-compose Python library
  become: true
  tags:
    - docker
    - docker_config
  block:
    - name: Install docker-compose via pip
      ansible.builtin.pip:
        name:
          - docker
          - docker-compose
        state: present
        executable: pip3

  rescue:
    - name: Handle pip installation failure
      ansible.builtin.debug:
        msg: "docker-compose pip installation encountered an issue"

- name: Verify Docker installation
  tags:
    - docker
  block:
    - name: Get Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"
