---
# Task 2 & 3: Web App Role Defaults
# Application Configuration

web_app_name: devops-app
web_app_docker_image: iliadocker21/devops-info-python
web_app_docker_tag: latest
web_app_port: 8000
web_app_internal_port: 8080

# Docker Compose Config
web_app_compose_project_dir: "/opt/{{ web_app_name }}"
web_app_docker_compose_version: "3.8"

# Wipe Logic Control (Task 3)
# Set to true to remove application completely
# Usage: ansible-playbook deploy.yml -e "web_app_wipe=true"
web_app_wipe: false

# Environment variables for the application
web_app_environment: {}
#  ENVIRONMENT: production
#  LOG_LEVEL: info
