---
# Task 3: Include wipe tasks (runs first when requested)
- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

# Task 2: Deploy application with Docker Compose
- name: Deploy application with Docker Compose
  tags:
    - app_deploy
    - compose
  block:
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}"
        state: directory
        mode: '0755'
      become: true

    - name: Template docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ web_app_compose_project_dir }}/docker-compose.yml"
        mode: '0644'
      become: true
      register: web_app_compose_template_result

    - name: Pull latest image
      ansible.builtin.shell: |
        docker pull {{ web_app_docker_image }}:{{ web_app_docker_tag }}
      register: web_app_image_pull_result
      failed_when: false
      changed_when: "'Already exists' not in web_app_image_pull_result.stderr"

    - name: Deploy with docker-compose up
      ansible.builtin.shell: |
        cd {{ web_app_compose_project_dir }}
        docker compose up -d
      become: true
      register: web_app_docker_compose_result
      changed_when: |
        'started' in web_app_docker_compose_result.stderr or
        'Pulling' in web_app_docker_compose_result.stderr or
        'Creating' in web_app_docker_compose_result.stdout

    - name: Wait for application to be ready
      ansible.builtin.wait_for:
        port: "{{ web_app_port }}"
        delay: 5
        timeout: 60
      become: true

    - name: Verify application health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ web_app_port }}/health"
        method: GET
        status_code: 200
      register: web_app_health_check
      retries: 5
      delay: 3
      until: web_app_health_check.status == 200
      failed_when: false

    - name: Display health check result
      ansible.builtin.debug:
        msg: "Application {{ web_app_name }} is healthy: {{ web_app_health_check.status | default('UNKNOWN') }}"

    - name: Create deployment log
      ansible.builtin.copy:
        content: |
          Application {{ web_app_name }} deployed successfully at {{ ansible_date_time.iso8601 }}
          Docker Image: {{ web_app_docker_image }}:{{ web_app_docker_tag }}
          Port: {{ web_app_port }}
          Compose Directory: {{ web_app_compose_project_dir }}
        dest: "/tmp/{{ web_app_name }}_deployed.log"
        mode: '0644'
      become: true

  rescue:
    - name: Handle deployment failure
      ansible.builtin.debug:
        msg: "Application deployment encountered an issue. Check logs above."

- name: Display deployment summary
  ansible.builtin.debug:
    msg: |
      Application Deployment Summary:
      - Name: {{ web_app_name }}
      - Image: {{ web_app_docker_image }}:{{ web_app_docker_tag }}
      - Port: {{ web_app_port }}
      - Directory: {{ web_app_compose_project_dir }}
      - Access at: http://localhost:{{ web_app_port }}/
  tags:
    - app_deploy
    - compose
